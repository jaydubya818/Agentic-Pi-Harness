name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - run: npx tsc --noEmit
      - run: npx vitest run
      - name: npm audit (high+ only)
        run: npm audit --audit-level=high || exit 1

  golden-proof:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: verify committed golden tape
        run: npx tsx src/cli/verify.ts ./goldens/canonical/tape.jsonl
      - name: replay committed golden tape
        run: npx tsx src/cli/replay.ts ./goldens/canonical/tape.jsonl
      - name: run canonical golden path
        run: |
          rm -rf ./.golden/work ./.golden/out
          npx tsx src/cli/run.ts ./.golden/work ./.golden/out
      - name: compare Level A tape events against committed golden
        run: |
          TAPE=$(find ./.golden/out/tapes -name '*.jsonl' | head -1)
          npx tsx scripts/compare-tape-events.ts "$TAPE" ./goldens/canonical/tape.jsonl
      - name: compare Level B effects against committed golden
        run: |
          EFFECT=$(find ./.golden/out/effects -name '*.jsonl' | head -1)
          node scripts/compare-effects.mjs "$EFFECT" ./goldens/canonical/effects.jsonl
      - name: compare Level C decisions against committed golden (exact)
        run: |
          POLICY=$(find ./.golden/out/sessions -name 'policy.jsonl' | head -1)
          node scripts/compare-decisions.mjs "$POLICY" ./goldens/canonical/policy.jsonl
      - name: compare Level C decisions against committed golden (semantic)
        run: |
          POLICY=$(find ./.golden/out/sessions -name 'policy.jsonl' | head -1)
          node scripts/compare-decisions.mjs --semantic "$POLICY" ./goldens/canonical/policy.jsonl
