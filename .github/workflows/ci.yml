name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - run: npx tsc --noEmit
      - run: npx vitest run
      - name: npm audit (high+ only)
        run: npm audit --audit-level=high || exit 1

  golden-path:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - run: npx tsx src/cli/run.ts ./.pi-work ./.pi-out
      - name: verify tape hash chain
        run: |
          TAPE=$(ls ./.pi-out/tapes/*.jsonl | head -1)
          npx tsx src/cli/verify.ts "$TAPE"
      - name: replay pretty-print
        run: |
          TAPE=$(ls ./.pi-out/tapes/*.jsonl | head -1)
          npx tsx src/cli/replay.ts "$TAPE"

  replay-drift:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: first run
        run: npx tsx src/cli/run.ts ./.pi-work1 ./.pi-out1
      - name: second run
        run: npx tsx src/cli/run.ts ./.pi-work2 ./.pi-out2
      - name: compare effect logs
        run: |
          F1=$(ls ./.pi-out1/effects/*.jsonl | head -1)
          F2=$(ls ./.pi-out2/effects/*.jsonl | head -1)
          node scripts/compare-effects.mjs "$F1" "$F2"
      - name: compare decision logs (exact)
        run: |
          D1=$(ls ./.pi-out1/sessions/*/policy.jsonl | head -1)
          D2=$(ls ./.pi-out2/sessions/*/policy.jsonl | head -1)
          node scripts/compare-decisions.mjs "$D1" "$D2"
      - name: compare decision logs (semantic)
        run: |
          D1=$(ls ./.pi-out1/sessions/*/policy.jsonl | head -1)
          D2=$(ls ./.pi-out2/sessions/*/policy.jsonl | head -1)
          node scripts/compare-decisions.mjs --semantic "$D1" "$D2"
