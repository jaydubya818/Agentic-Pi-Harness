name: replay-drift
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.1 }
      - run: npm ci || npm install
      - run: npm run build
      - run: node dist/cli/index.js doctor
      - run: node dist/cli/index.js run ./.pi-work ./.pi-out
      - name: verify tape
        run: |
          TAPE=$(ls .pi-out/tapes/*.jsonl | head -1)
          node dist/cli/index.js verify "$TAPE"
